info:
  name: subtract numbers
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/calculator/subtract?x=10&y=7
  params:
    - name: x
      value: "10"
      type: query
    - name: y
      value: "7"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
