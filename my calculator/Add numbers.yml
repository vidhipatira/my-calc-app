info:
  name: Add numbers
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:3000/calculator/add?a=10&b=20
  params:
    - name: a
      value: "10"
      type: query
    - name: b
      value: "20"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
